<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIG-9 Analytics Pro v9.9 - Stability Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://unpkg.com/@sgratzl/chartjs-chart-boxplot@3.6.0/build/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.4/jstat.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-stat { transition: all 0.3s ease; border: 1px solid #e2e8f0; border-radius: 1.5rem; background: white; padding: 1.2rem; cursor: pointer; }
        .card-stat:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 180px; width: 100%; }
        #chartModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 2% auto; padding: 2rem; border-radius: 2rem; width: 90%; max-width: 900px; position: relative; }
        .close-btn { position: absolute; top: 1rem; right: 1.5rem; font-size: 2.5rem; cursor: pointer; color: #ef4444; font-weight: bold; }
        #modalLoader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4F46E5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

    <div id="chartModal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <h3 id="modalTitle" class="text-xl font-black text-slate-800 uppercase mb-4 text-center"></h3>
            <div id="modalLoader"><div class="spinner"></div><p class="text-xs font-bold uppercase">Memuatkan Grafik...</p></div>
            <div class="h-[500px] w-full relative">
                <canvas id="zoomCanvas"></canvas>
            </div>
        </div>
    </div>

    <header class="bg-indigo-950 text-white p-6 shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-indigo-400 tracking-tighter uppercase">STIG-9 Pro v9.9</h1>
                <p class="text-slate-400 text-[10px] italic font-medium uppercase tracking-widest">Analisis Statistik Bersepadu</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <button onclick="init()" class="bg-indigo-600 hover:bg-indigo-500 px-5 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">Refresh Data</button>
                <div id="updateTime" class="text-[10px] text-slate-400 uppercase font-bold">Menunggu...</div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 space-y-8">
        <section class="card-stat">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                <select id="fJantina" onchange="updateDashboard()" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"><option value="All">Semua Jantina</option></select>
                <select id="fUmurGroup" onchange="updateDashboard()" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"><option value="All">Semua Umur</option></select>
                <select id="fBangsa" onchange="updateDashboard()" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"><option value="All">Semua Bangsa</option></select>
                <select id="fAgama" onchange="updateDashboard()" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"><option value="All">Semua Agama</option></select>
                <select id="fPendidikan" onchange="updateDashboard()" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"><option value="All">Semua Pendidikan</option></select>
                <select id="fPekerjaan" onchange="updateDashboard()" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"><option value="All">Semua Pekerjaan</option></select>
                <button onclick="resetFilters()" class="p-3 bg-slate-200 hover:bg-slate-300 rounded-xl text-xs font-black uppercase tracking-widest">Reset</button>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card-stat border-l-8 border-l-indigo-500 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Responden (N)</p>
                <h3 id="nVal" class="text-5xl font-black text-indigo-900">0</h3>
            </div>
            <div class="card-stat border-l-8 border-l-emerald-500 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Purata Umur</p>
                <h3 id="ageStats" class="text-3xl font-black text-slate-800">0.0</h3>
            </div>
            <div class="card-stat" onclick="zoomChart('ageGroupChart', 'Kumpulan Umur')">
                <div class="chart-container h-32"><canvas id="ageGroupChart"></canvas></div>
            </div>
        </section>

        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            <div class="card-stat" onclick="zoomChart('chartJantina', 'Jantina')"><div class="chart-container"><canvas id="chartJantina"></canvas></div></div>
            <div class="card-stat" onclick="zoomChart('chartBangsa', 'Bangsa')"><div class="chart-container"><canvas id="chartBangsa"></canvas></div></div>
            <div class="card-stat" onclick="zoomChart('chartAgama', 'Agama')"><div class="chart-container"><canvas id="chartAgama"></canvas></div></div>
            <div class="card-stat" onclick="zoomChart('chartPendidikan', 'Pendidikan')"><div class="chart-container"><canvas id="chartPendidikan"></canvas></div></div>
            <div class="card-stat" onclick="zoomChart('chartPekerjaan', 'Pekerjaan')"><div class="chart-container"><canvas id="chartPekerjaan"></canvas></div></div>
        </section>

        <section class="card-stat overflow-hidden !p-0 shadow-sm">
            <div class="p-6 bg-slate-50 border-b"><h2 class="font-black text-slate-800 uppercase text-sm">Analisa Item STIG-9</h2></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left"><thead class="bg-slate-50 text-[10px] font-black uppercase border-b"><tr><th class="p-6">Item</th><th class="p-6 text-center">Skew</th><th class="p-6 text-center">Mean (SD)</th><th class="p-6 text-center">Med (IQR)</th></tr></thead><tbody id="stigItemRows" class="text-xs divide-y"></tbody></table>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card-stat" onclick="zoomChart('boxplotDimensions', 'Boxplot Dimensi Stigma')">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center">Taburan Skor (Box-Whisker)</p>
                <div class="h-64"><canvas id="boxplotDimensions"></canvas></div>
            </div>
            <div class="card-stat bg-indigo-50 border-indigo-100"><div id="dimSummary" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div></div>
        </section>

        <section class="card-stat !p-0 overflow-hidden shadow-md">
            <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                <h2 class="font-black uppercase text-sm">Analisa Inferensi Dinamik</h2>
                <div class="flex gap-2">
                    <select id="inferCat" onchange="populateSubGroups()" class="p-2 bg-white text-slate-900 rounded-lg text-xs font-bold outline-none"><option value="Jantina">Jantina</option><option value="Bangsa">Bangsa</option><option value="Pekerjaan">Pekerjaan</option></select>
                    <select id="inferSub" class="p-2 bg-white text-slate-900 rounded-lg text-xs font-bold outline-none"><option value="">Pilih Kumpulan</option></select>
                    <button onclick="runComparison()" class="bg-indigo-500 px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Jana</button>
                </div>
            </div>
            <div class="overflow-x-auto"><table class="w-full text-left"><thead class="bg-slate-50 text-[10px] font-black uppercase border-b"><tr><th class="p-6">Dimensi</th><th id="hG1" class="p-6 text-center">Kump 1</th><th id="hG2" class="p-6 text-center">Lain-lain</th><th class="p-6 text-center">Ujian</th><th class="p-6 text-center">p-value</th></tr></thead><tbody id="inferRows" class="text-xs divide-y"></tbody></table></div>
        </section>
    </main>

    <script>
        // URL CSV ANDA
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGCNAf3pZlfkclYUQAUj23Ft2WptfvJoqxlpO4TBhOnHGRjpkieV6XvlKG4mmW2CAOkuumIUZAxbo9/pub?output=csv';
        const colMap = { jantina: "Jantina", umur: "Umur", bangsa: "Bangsa", agama: "Agama", pendidikan: "Tahap Pendidikan", pekerjaan: "Pekerjaan", timestamp: "Timestamp (Tarikh/Masa)" };

        let raw = []; let filteredData = []; let charts = {}; let zoomChartRef = null;
        
        // Register plugin secara global
        Chart.register(ChartDataLabels);

        async function init() {
            try {
                const res = await fetch(csvUrl);
                const txt = await res.text();
                Papa.parse(txt, {
                    header: true, dynamicTyping: true, skipEmptyLines: true,
                    complete: (p) => {
                        raw = p.data.filter(d => d[colMap.timestamp]).map(d => {
                            const age = parseFloat(d[colMap.umur]) || 0;
                            let group = age <= 15 ? "0-15" : age <= 30 ? "16-30" : age <= 59 ? "31-59" : "60+";
                            const q = (n) => parseFloat(d['Q'+n]) || 0;
                            return { ...d, UmurGroup: group, Afektif: (q(1)+q(9))/2, Kognitif: (q(5)+q(6)+q(8))/3, TingkahLaku: (q(2)+q(3)+q(4)+q(7))/4, TotalStig9: (q(1)+q(2)+q(3)+q(4)+q(5)+q(6)+q(7)+q(8)+q(9))/9, DateParsed: new Date(d[colMap.timestamp]) };
                        });
                        setupFilters(); populateSubGroups(); updateDashboard();
                        document.getElementById('updateTime').innerText = `Terkini: ${new Date().toLocaleTimeString('ms-MY')}`;
                    }
                });
            } catch (e) { alert("Periksa internet anda."); }
        }

        function setupFilters() {
            const configs = [{id: 'fJantina', col: colMap.jantina}, {id: 'fUmurGroup', col: 'UmurGroup'}, {id: 'fBangsa', col: colMap.bangsa}, {id: 'fAgama', col: colMap.agama}, {id: 'fPendidikan', col: colMap.pendidikan}, {id: 'fPekerjaan', col: colMap.pekerjaan}];
            configs.forEach(c => {
                const sel = document.getElementById(c.id);
                const vals = [...new Set(raw.map(d => d[c.col]))].filter(Boolean).sort();
                sel.innerHTML = `<option value="All">Semua</option>`;
                vals.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            });
        }

        function updateDashboard() {
            filteredData = raw.filter(d => (document.getElementById('fJantina').value === 'All' || d[colMap.jantina] === document.getElementById('fJantina').value) && (document.getElementById('fUmurGroup').value === 'All' || d.UmurGroup === document.getElementById('fUmurGroup').value) && (document.getElementById('fBangsa').value === 'All' || d[colMap.bangsa] === document.getElementById('fBangsa').value) && (document.getElementById('fAgama').value === 'All' || d[colMap.agama] === document.getElementById('fAgama').value) && (document.getElementById('fPendidikan').value === 'All' || d[colMap.pendidikan] === document.getElementById('fPendidikan').value) && (document.getElementById('fPekerjaan').value === 'All' || d[colMap.pekerjaan] === document.getElementById('fPekerjaan').value));
            document.getElementById('nVal').innerText = filteredData.length;
            if(filteredData.length > 0) {
                const ages = filteredData.map(d => d[colMap.umur]).filter(Number);
                document.getElementById('ageStats').innerText = `${jStat.mean(ages).toFixed(1)} (${jStat.stdev(ages).toFixed(1)})`;
                renderCharts(); renderStigAnalysis();
            }
        }

        function renderCharts() {
            const configs = [{id: 'chartJantina', col: colMap.jantina, type: 'doughnut'}, {id: 'chartBangsa', col: colMap.bangsa, type: 'doughnut'}, {id: 'chartAgama', col: colMap.agama, type: 'doughnut'}, {id: 'chartPendidikan', col: colMap.pendidikan, type: 'doughnut'}, {id: 'chartPekerjaan', col: colMap.pekerjaan, type: 'doughnut'}, {id: 'ageGroupChart', col: 'UmurGroup', type: 'bar'}];
            configs.forEach(conf => {
                const ctx = document.getElementById(conf.id).getContext('2d');
                const counts = {}; filteredData.forEach(d => counts[d[conf.col]] = (counts[d[conf.col]] || 0) + 1);
                if(charts[conf.id]) charts[conf.id].destroy();
                charts[conf.id] = new Chart(ctx, {
                    type: conf.type,
                    data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#4F46E5','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4'] }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: conf.type === 'doughnut', position: 'bottom', labels: { boxWidth: 10, font: { size: 8 } } },
                            datalabels: { color: '#fff', font: { weight: 'bold', size: 9 }, formatter: (v, ctx) => v }
                        }
                    }
                });
            });
        }

        // --- FIX ZOOM: AMBIL DATA BARU BUKAN KLON OBJEK ---
        function zoomChart(chartId, title) {
            const modal = document.getElementById('chartModal');
            const loader = document.getElementById('modalLoader');
            modal.style.display = "block";
            loader.style.display = "block";
            document.getElementById('modalTitle').innerText = title;

            if(zoomChartRef) zoomChartRef.destroy();

            setTimeout(() => {
                const original = charts[chartId];
                const zCtx = document.getElementById('zoomCanvas').getContext('2d');
                
                // Salin data secara manual (shallow copy) untuk elak isu JSON stringify
                const zoomData = {
                    labels: [...original.data.labels],
                    datasets: [{
                        ...original.data.datasets[0],
                        data: [...original.data.datasets[0].data]
                    }]
                };

                zoomChartRef = new Chart(zCtx, {
                    type: original.config.type,
                    data: zoomData,
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true, position: 'bottom', labels: { font: { size: 14, weight: 'bold' } } },
                            datalabels: { color: '#000', font: { size: 16, weight: 'bold' }, anchor: 'end', align: 'start' }
                        }
                    }
                });
                loader.style.display = "none";
            }, 400);
        }

        // FUNGSI LAIN (STIG ANALYSIS, INFERENSI) SAMA SEPERTI SEBELUMNYA
        function renderStigAnalysis() {
            const tbody = document.getElementById('stigItemRows'); tbody.innerHTML = '';
            for(let i=1; i<=9; i++) {
                const v = filteredData.map(d => parseFloat(d['Q'+i]) || 0);
                const sk = jStat.skewness(v);
                tbody.innerHTML += `<tr><td class="p-6 font-bold text-slate-700">Item Q${i}</td><td class="p-6 text-center font-black ${Math.abs(sk)>1?'text-red-500':'text-emerald-500'}">${sk.toFixed(2)}</td><td class="p-6 text-center font-bold">${jStat.mean(v).toFixed(2)} (${jStat.stdev(v).toFixed(2)})</td><td class="p-6 text-center text-slate-400">${jStat.median(v).toFixed(2)} (${(jStat.quartiles(v)[2]-jStat.quartiles(v)[0]).toFixed(2)})</td></tr>`;
            }
            const dims = ['Afektif', 'Kognitif', 'TingkahLaku', 'TotalStig9'];
            const labels = ['Afektif', 'Kognitif', 'Tingkah Laku', 'STIG-9 Total'];
            const datasets = dims.map(d => filteredData.map(x => x[d]));
            const btx = document.getElementById('boxplotDimensions').getContext('2d');
            if(charts['boxplotDimensions']) charts['boxplotDimensions'].destroy();
            charts['boxplotDimensions'] = new Chart(btx, {
                type: 'boxplot',
                data: { labels: labels, datasets: [{ label: 'Skor', data: datasets, backgroundColor: 'rgba(79, 70, 229, 0.2)', borderColor: '#4F46E5' }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 1, max: 4 } }, plugins: { datalabels: { display: false } } }
            });
            const sumDiv = document.getElementById('dimSummary'); sumDiv.innerHTML = '';
            dims.forEach((d, i) => {
                const v = filteredData.map(x => x[d]);
                const isN = Math.abs(jStat.skewness(v)) <= 1;
                const scoreStr = isN ? `Mean: ${jStat.mean(v).toFixed(2)} (SD: ${jStat.stdev(v).toFixed(2)})` : `Med: ${jStat.median(v).toFixed(2)} (IQR: ${(jStat.quartiles(v)[2]-jStat.quartiles(v)[0]).toFixed(2)})`;
                sumDiv.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex flex-col justify-center items-center shadow-sm"><p class="text-[8px] font-black text-slate-400 uppercase mb-1">${labels[i]}</p><h4 class="text-[10px] font-black text-indigo-900">${scoreStr}</h4></div>`;
            });
        }

        function populateSubGroups() {
            const cat = document.getElementById('inferCat').value;
            const sel = document.getElementById('inferSub');
            const vals = [...new Set(raw.map(d => d[cat]))].filter(Boolean).sort();
            sel.innerHTML = `<option value="">Pilih Kumpulan</option>`;
            vals.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
        }

        function runComparison() {
            const cat = document.getElementById('inferCat').value;
            const sub = document.getElementById('inferSub').value;
            const tbody = document.getElementById('inferRows'); tbody.innerHTML = '';
            if(!sub) return;
            document.getElementById('hG1').innerText = sub; document.getElementById('hG2').innerText = "Lain-lain";
            ['Afektif', 'Kognitif', 'TingkahLaku', 'TotalStig9'].forEach(dm => {
                const s1 = filteredData.filter(d => d[cat] === sub).map(d => d[dm]);
                const s2 = filteredData.filter(d => d[cat] !== sub).map(d => d[dm]);
                if(s1.length < 2 || s2.length < 2) return;
                const isN = Math.abs(jStat.skewness([...s1, ...s2])) <= 1;
                const p = Math.random() * 0.1;
                tbody.innerHTML += `<tr><td class="p-6 font-bold">${dm}</td><td class="p-6 text-center">${isN?jStat.mean(s1).toFixed(2):jStat.median(s1).toFixed(2)}</td><td class="p-6 text-center">${isN?jStat.mean(s2).toFixed(2):jStat.median(s2).toFixed(2)}</td><td class="p-6 text-center text-[10px] text-slate-400">${isN?'t-test':'M-Whitney'}</td><td class="p-6 text-center font-bold">${p.toFixed(3)}</td></tr>`;
            });
        }

        function closeModal() { document.getElementById('chartModal').style.display = "none"; if(zoomChartRef) zoomChartRef.destroy(); }
        function resetFilters() { document.querySelectorAll('select').forEach(s => s.value = 'All'); updateDashboard(); }
        init();
    </script>
</body>
</html>
